<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whale Signal Bot</title>
    <style>
        :root{--bg:#05070b;--panel:#0d1117;--border:#253044;--text:#f3f4f6;--muted:#9ca3af;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--blue:#38bdf8;--purple:#a78bfa}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#111827 0%,var(--bg) 45%);color:var(--text)}.app{width:min(1100px,94vw);margin:0 auto;padding:24px 0 60px}.hero{text-align:center;margin-bottom:22px}.hero h1{margin:10px 0 6px;font-size:clamp(26px,5vw,44px)}.hero p{margin:0;color:var(--muted);font-size:14px}.command-box{display:grid;grid-template-columns:1fr auto;gap:10px;max-width:720px;margin:18px auto 12px;background:rgba(17,24,39,.88);border:1px solid var(--border);border-radius:18px;padding:12px;box-shadow:0 18px 60px rgba(0,0,0,.35)}input{width:100%;background:#0b1220;border:1px solid #334155;color:var(--text);border-radius:12px;padding:14px 16px;font-size:16px;outline:none}input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(56,189,248,.16)}button{border:0;border-radius:12px;padding:14px 18px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:white;font-weight:700;cursor:pointer;min-width:110px}button:disabled{opacity:.65;cursor:not-allowed}.status{display:none;max-width:720px;margin:10px auto 20px;border:1px solid #1e3a8a;background:rgba(30,58,138,.18);border-radius:16px;padding:14px;color:#dbeafe;text-align:left}.status.active{display:block}.status-title{display:flex;align-items:center;gap:10px;font-weight:800;margin-bottom:6px}.spinner{width:18px;height:18px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;animation:spin .9s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.bar{height:8px;background:#0f172a;border-radius:999px;overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;width:45%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:999px;animation:load 1.25s ease-in-out infinite}@keyframes load{0%{transform:translateX(-110%)}100%{transform:translateX(245%)}}.section{margin:22px 0}.section h2{display:flex;justify-content:space-between;align-items:center;margin:0 0 12px;font-size:20px}.count{color:var(--muted);font-size:13px;font-weight:normal}.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}.summary-tile{background:rgba(15,23,42,.92);border:1px solid #263349;border-radius:14px;padding:12px}.summary-tile label{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}.summary-tile strong{font-size:16px}.summary-mode{border-color:rgba(56,189,248,.45)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}.card{background:linear-gradient(180deg,rgba(17,24,39,.98),rgba(3,7,18,.98));border:1px solid var(--border);border-radius:18px;padding:16px;text-align:left;box-shadow:0 12px 34px rgba(0,0,0,.25)}.card.actionable{border-color:rgba(34,197,94,.55)}.card.context{border-color:rgba(250,204,21,.45)}.card.ignore{border-color:rgba(239,68,68,.35);opacity:.86}.token-line{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}.token-name{font-size:21px;font-weight:900;letter-spacing:-.02em}.contract{color:var(--muted);font-size:12px;word-break:break-all;margin-top:3px}.badges{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 12px}.badge{font-size:11px;padding:5px 8px;border-radius:999px;background:#172033;color:#d1d5db;border:1px solid #334155;white-space:nowrap}.badge.green{color:#bbf7d0;border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.12)}.badge.yellow{color:#fef08a;border-color:rgba(250,204,21,.5);background:rgba(250,204,21,.10)}.badge.red{color:#fecaca;border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.10)}.badge.blue{color:#bae6fd;border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.10)}.badge.purple{color:#ddd6fe;border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.10)}.metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:8px}.metric{background:rgba(15,23,42,.9);border:1px solid #1f2937;border-radius:12px;padding:10px}.metric label{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}.metric strong{font-size:14px}.reason{color:#d1d5db;line-height:1.45;margin-top:12px;font-size:14px}.empty{border:1px dashed #334155;color:var(--muted);border-radius:16px;padding:16px;text-align:center}.raw{white-space:pre-wrap;text-align:left;background:#020617;border:1px solid #1f2937;border-radius:14px;padding:14px;color:#cbd5e1;font-size:13px;overflow-x:auto}details{margin-top:20px}details summary{cursor:pointer;color:var(--muted);margin-bottom:8px}@media(max-width:620px){.app{width:94vw;padding-top:18px}.command-box{grid-template-columns:1fr}button{width:100%}.metrics{grid-template-columns:1fr 1fr}.token-name{font-size:19px}.summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    </style>
</head>
<body>
<main class="app">
    <div class="hero"><h1>🤖 Whale Signal Bot</h1><p>Scan · Wallet Check · Ethereum ERC-20 Cluster</p></div>
    <div class="command-box"><input id="input" placeholder="scan oder 0x..." autocomplete="off" /><button id="sendBtn" onclick="send()">Senden</button></div>
    <div id="status" class="status"><div class="status-title"><span class="spinner"></span><span id="statusTitle">Command received. Scanning...</span></div><div id="statusText">Der Bot fragt externe APIs ab. Das kann ein paar Sekunden dauern.</div><div class="bar"><span></span></div></div>
    <div id="output"></div>
</main>
<script>
const API_URL="https://mein-bot-1f91.onrender.com/message";
const BASE_ASSETS=new Set(["ETH","WETH","BTC","WBTC","LBTC","CBBTC","TBTC","USDT","USDC","DAI","USDD","FRAX","TUSD","USDE"]);
const input=document.getElementById("input"),btn=document.getElementById("sendBtn"),statusBox=document.getElementById("status"),statusTitle=document.getElementById("statusTitle"),statusText=document.getElementById("statusText"),output=document.getElementById("output");
input.addEventListener("keydown",e=>{if(e.key==="Enter")send()});
function shortAddress(v){if(!v||!v.startsWith("0x")||v.length<12)return v||"n/a";return v.slice(0,8)+"..."+v.slice(-4)}
function escapeHtml(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;")}
function normalizeToken(rawToken,contract,sizeText){let token=(rawToken||"").trim();if(!token||token.toLowerCase().startsWith("0x")){const p=(sizeText||"").trim().split(/\s+/);const maybe=p[p.length-1];if(maybe&&!maybe.toLowerCase().startsWith("0x"))token=maybe}if(!token||token.toLowerCase().startsWith("0x"))token="UNRESOLVED";const symbol=token.toUpperCase();return{name:symbol==="UNRESOLVED"?"Unknown Token":token,symbol,identity:symbol==="UNRESOLVED"?"low":"medium",contract:contract||""}}
function backendClassification(text){const m=text.match(/Classification:\s*(actionable|context_only|context|ignore)/i);if(!m)return null;const v=m[1].toLowerCase();return v==="context_only"?"context":v}
function backendIdentity(text){const m=text.match(/Identity:\s*(high|medium|low)/i);return m?m[1].toLowerCase():null}
function backendEvidence(text){const m=text.match(/Evidence:\s*([^|\n]+)/i);return m?m[1].trim():"transfer-based"}
function fallbackClassify(symbol,identity,header,reason){const upper=(symbol||"").toUpperCase();const text=`${header||""} ${reason||""}`.toLowerCase();if(identity==="low")return"ignore";if(BASE_ASSETS.has(upper)||text.includes("stablecoin")||text.includes("wrapped")||text.includes("base-/wrapped"))return"context";return"actionable"}
function extractSize(parts,symbol){const sym=(symbol||"").replace(/[.*+?^${}()|[\]\\]/g,"\\$&");let size=parts.find(p=>new RegExp(`^[-+]?\\d[\\d,.]*\\s+${sym}$`,`i`).test(p));if(size)return size;size=parts.find(p=>/^[-+]?\d[\d,.]*\s+/i.test(p)&&!/wallets?|events?|utc|confidence/i.test(p));return size||"n/a"}
function cleanReason(lines){const transfer=lines.find(l=>/^Transfer-Erkennung:/i.test(l));if(transfer)return transfer.replace(/^Transfer-Erkennung:\s*real\s*\|\s*/i,"");return lines.filter(l=>!/^Classification:/i.test(l)&&!/^Markt-Enrichment:/i.test(l)).join(" ")||"Whale-Cluster im selben Zeitfenster erkannt."}
function readLineValue(text,label){const re=new RegExp(`^${label}:\\s*(.+)$`,`im`);const m=text.match(re);return m?m[1].trim():null}
function parseSummary(text,data){return{events:readLineValue(text,"Events scanned")||((text.match(/Real:\s*ERC-20 Transfer-Logs aus\s*(\d+)/i)||[])[1]||"n/a"),window:readLineValue(text,"Zeitraum")||"n/a",clusters:readLineValue(text,"Gefundene Cluster")||String(data.top.length+data.market.length+data.ignored.length),top:readLineValue(text,"Top Opportunities")||String(data.top.length),context:readLineValue(text,"Context Signals")||String(data.market.length),ignored:readLineValue(text,"Ignored Signals")||String(data.ignored.length),mode:readLineValue(text,"Filter-Modus")||"strict"}}
function parseScanText(text){const scan={top:[],market:[],ignored:[],notes:[],raw:text};const clean=text.replace(/\r/g,"");const noteStart=clean.search(/\n?(Signal-first|Limit:|Real:|Kein direktes Signal|No strong|No actionable)/i);const body=noteStart>=0?clean.slice(0,noteStart):clean;const notes=noteStart>=0?clean.slice(noteStart).trim():"";if(notes)scan.notes=notes.split("\n").filter(Boolean);const regex=/(?:^|\n)\s*(\d+)\.\s+([\s\S]*?)(?=\n\s*\d+\.\s+|\n\s*(?:Signal-first|Limit:|Real:|Kein direktes Signal|No strong|No actionable)|$)/gi;let match;while((match=regex.exec(body))!==null){const chunk=match[2].trim();const lines=chunk.split("\n").map(l=>l.trim()).filter(Boolean);const header=lines[0]||chunk;const joined=lines.join(" ");const parts=header.split("|").map(p=>p.trim());const rawToken=parts[0]||"Unknown";const contract=parts.find(p=>/^0x[a-fA-F0-9]{10,}$/.test(p))||"";const signalType=parts.find(p=>/^(accumulation|distribution|rotation|mixed_flow)$/i.test(p))||"signal";const wallets=parts.find(p=>/wallets/i.test(p))||"n/a";const events=parts.find(p=>/events/i.test(p))||"n/a";const confidence=(parts.find(p=>/confidence/i.test(p))||"confidence unknown").replace(/confidence/i,"").trim()||"unknown";const timeWindow=parts.find(p=>/utc/i.test(p))||"n/a";const tokenProbe=normalizeToken(rawToken,contract,"");const size=extractSize(parts,tokenProbe.symbol);const token=normalizeToken(rawToken,contract,size);const identity=backendIdentity(joined)||token.identity;const classification=backendClassification(joined)||fallbackClassify(token.symbol,identity,header,joined);const item={...token,identity,classification,signalType,evidence:backendEvidence(joined),wallets,events,size,timeWindow,confidence,reason:cleanReason(lines)};if(classification==="actionable")scan.top.push(item);else if(classification==="context")scan.market.push(item);else scan.ignored.push(item)}return scan}
function badge(text,color=""){return`<span class="badge ${color}">${escapeHtml(text)}</span>`}
function renderCard(item){const cls=item.classification==="actionable"?"actionable":item.classification==="context"?"context":"ignore";const clsBadge=item.classification==="actionable"?badge("actionable","green"):item.classification==="context"?badge("context only","yellow"):badge("ignore","red");const sigColor=/accumulation/i.test(item.signalType)?"green":/distribution/i.test(item.signalType)?"yellow":"purple";const identityColor=item.identity==="high"?"green":item.identity==="medium"?"yellow":"red";return`<article class="card ${cls}"><div class="token-line"><div><div class="token-name">${escapeHtml(item.name)} <span style="color:var(--muted);">(${escapeHtml(item.symbol)})</span></div><div class="contract">Contract: ${escapeHtml(shortAddress(item.contract))}</div></div><div>${clsBadge}</div></div><div class="badges">${badge(item.signalType,sigColor)}${badge(item.evidence,"blue")}${badge("identity "+item.identity,identityColor)}${badge("confidence "+item.confidence,item.confidence==="high"?"green":"yellow")}</div><div class="metrics"><div class="metric"><label>Wallets</label><strong>${escapeHtml(item.wallets)}</strong></div><div class="metric"><label>Events</label><strong>${escapeHtml(item.events)}</strong></div><div class="metric"><label>Size</label><strong>${escapeHtml(item.size)}</strong></div><div class="metric"><label>Window</label><strong>${escapeHtml(item.timeWindow)}</strong></div></div><div class="reason">${escapeHtml(item.reason)}</div></article>`}
function renderSection(title,items,emptyText){return`<section class="section"><h2>${escapeHtml(title)} <span class="count">${items.length}</span></h2>${items.length?`<div class="grid">${items.map(renderCard).join("")}</div>`:`<div class="empty">${escapeHtml(emptyText)}</div>`}</section>`}
function renderSummary(summary){return`<section class="section"><h2>Scan Summary</h2><div class="card"><div class="summary-grid"><div class="summary-tile"><label>Events scanned</label><strong>${escapeHtml(summary.events)}</strong></div><div class="summary-tile"><label>Zeitraum</label><strong>${escapeHtml(summary.window)}</strong></div><div class="summary-tile"><label>Cluster</label><strong>${escapeHtml(summary.clusters)}</strong></div><div class="summary-tile"><label>Top</label><strong>${escapeHtml(summary.top)}</strong></div><div class="summary-tile"><label>Context</label><strong>${escapeHtml(summary.context)}</strong></div><div class="summary-tile"><label>Ignored</label><strong>${escapeHtml(summary.ignored)}</strong></div><div class="summary-tile summary-mode"><label>Filter-Modus</label><strong>${escapeHtml(summary.mode)}</strong></div></div></div></section>`}
function renderScan(text){const data=parseScanText(text);const summary=parseSummary(text,data);output.innerHTML=`${renderSummary(summary)}${renderSection("Top Altcoin Opportunities",data.top,"Keine starken Altcoin-Signale im aktuellen Scan-Fenster gefunden.")}${renderSection("Market Context",data.market,"Kein separater Markt-Kontext erkannt.")}${renderSection("Filtered / Ignored",data.ignored,"Keine ignorierten/unaufgelösten Signale.")}${data.notes.length?`<section class="section"><h2>Notes</h2><div class="card"><div class="reason">${data.notes.map(escapeHtml).join("<br>")}</div></div></section>`:""}<details><summary>Raw response anzeigen</summary><div class="raw">${escapeHtml(text)}</div></details>`}
function renderPlain(text){output.innerHTML=`<section class="section"><h2>Antwort</h2><div class="card"><div class="reason">${escapeHtml(text).replace(/\n/g,"<br>")}</div></div></section>`}
function setLoading(active,delayed=false){btn.disabled=active;btn.textContent=active?"Scanning...":"Senden";statusBox.classList.toggle("active",active);if(active){statusTitle.textContent=delayed?"Still scanning...":"Command received. Scanning...";statusText.textContent=delayed?"Externe API ist langsam. Der Bot arbeitet weiter.":"Der Bot fragt externe APIs ab. Das kann ein paar Sekunden dauern."}}
async function send(){const text=input.value.trim();if(!text)return;output.innerHTML="";setLoading(true);const slowTimer=setTimeout(()=>setLoading(true,true),7000);try{const controller=new AbortController();const timeout=setTimeout(()=>controller.abort(),60000);const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text}),signal:controller.signal});clearTimeout(timeout);if(!res.ok)throw new Error("HTTP "+res.status);const data=await res.json();const response=data.response||JSON.stringify(data,null,2);if(/scan fertig|transfer-logs|top altcoin|top whale|mehrere grosse wallets/i.test(response))renderScan(response);else renderPlain(response)}catch(error){renderPlain("Scan failed. Bitte erneut versuchen. Fehler: "+error.message)}finally{clearTimeout(slowTimer);setLoading(false)}}
</script>
</body>
</html>
